name: Quality Gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: platform_test
          POSTGRES_DB: platform_test_control
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform_test -d platform_test_control"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_DATABASE_URL: postgres://platform_test@127.0.0.1:5432/platform_test_control?sslmode=disable
      GOTELEMETRY: "off"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: platform/backend/go.mod
          cache-dependency-path: platform/backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            platform/admin-web/package-lock.json
            platform/sdk/typescript/package-lock.json
            platform/client-ui/package-lock.json

      - name: Install client SDK dependencies
        working-directory: platform/sdk/typescript
        run: npm ci

      - name: Install client UI dependencies
        working-directory: platform/client-ui
        run: npm ci

      - name: Install admin dependencies
        working-directory: platform/admin-web
        run: npm ci

      - name: Run shared quality gate
        shell: pwsh
        run: ./scripts/quality-gate.ps1 -Mode Full -RequirePostgres

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: artifacts/reviews/F0-03/quality-gate-report.json
          if-no-files-found: error
          retention-days: 14
